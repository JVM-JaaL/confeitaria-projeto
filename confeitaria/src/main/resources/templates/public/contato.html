<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contato — Confeitaria</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-logo"><a th:href="@{/}" style="color:inherit">🎂 Confeitaria</a></div>
    <div class="nav-links">
      <a th:href="@{/}">Início</a>
      <a th:href="@{/faq}">FAQ</a>
    </div>
  </div>
</nav>

<div style="background: linear-gradient(135deg,var(--pink-100),var(--blue-100)); padding:3rem 2rem; text-align:center;">
  <h1 style="font-family:'Playfair Display',serif; font-size:2.5rem; color:var(--text-dark);">Fazer um Pedido</h1>
  <p style="color:var(--text-mid); margin-top:0.5rem;">Adoramos ouvir sobre suas ideias! Vamos criar algo especial juntos.</p>
</div>

<section class="section" style="max-width:750px;">
  <div th:if="${param.sucesso}" class="alert alert-success">
    🎉 Mensagem enviada com sucesso! Entraremos em contato em breve.
  </div>

  <div th:if="${ref != null}" class="alert alert-info">
    🎁 Você foi indicado por <strong th:text="${ref}"></strong>! Mencione isso no seu pedido.
  </div>

  <div class="form-card">
    <form th:action="@{/contato}" th:object="${contact}" method="post">
      <input type="hidden" name="ref" th:value="${ref}"/>
      <div class="form-group">
        <label>Nome completo *</label>
        <input type="text" th:field="*{name}" placeholder="Seu nome" required/>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label>E-mail *</label>
          <input type="email" th:field="*{email}" placeholder="seu@email.com" required/>
        </div>
        <div class="form-group">
          <label>WhatsApp</label>
          <input type="tel" th:field="*{phone}" placeholder="(11) 99999-9999"/>
        </div>
      </div>
      <div class="form-group">
        <label>Como nos encontrou?</label>
        <select name="source">
          <option value="site">Site</option>
          <option value="instagram">Instagram</option>
          <option value="indicacao">Indicação de amigo</option>
          <option value="google">Google</option>
          <option value="outro">Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Seu pedido / mensagem *</label>
        <textarea th:field="*{message}" placeholder="Conte-nos tudo sobre o que você deseja: tipo, sabor, tamanho, data do evento, número de porções..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:1rem; font-size:1rem; border-radius:12px;">✉️ Enviar Mensagem</button>
    </form>
  </div>
</section>

<footer>
  <p>🎂 Confeitaria Artesanal — Feito com amor</p>
</footer>
</body>
</html>
