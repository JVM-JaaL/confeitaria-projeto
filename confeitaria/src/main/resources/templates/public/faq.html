<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ — Confeitaria</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-logo"><a th:href="@{/}" style="color:inherit">🎂 Confeitaria</a></div>
    <div class="nav-links">
      <a th:href="@{/}">Início</a>
      <a th:href="@{/faq}">FAQ</a>
      <a th:href="@{/contato}" class="btn btn-primary btn-sm" style="margin-left:1.5rem">Fazer Pedido</a>
    </div>
  </div>
</nav>

<div style="background: linear-gradient(135deg,var(--pink-100),var(--blue-100)); padding:3rem 2rem; text-align:center;">
  <h1 style="font-family:'Playfair Display',serif; font-size:2.5rem; color:var(--text-dark);">Perguntas Frequentes</h1>
  <p style="color:var(--text-mid); margin-top:0.5rem;">Tire suas dúvidas antes de fazer seu pedido</p>
</div>

<section class="section" style="max-width:750px;">
  <div th:each="faq : ${faqs}" class="faq-item">
    <div class="faq-question">
      <span th:text="${faq.question}">Pergunta</span>
      <span class="faq-arrow">▼</span>
    </div>
    <div class="faq-answer">
      <p th:text="${faq.answer}">Resposta</p>
    </div>
  </div>

  <div style="text-align:center; margin-top:2.5rem; padding:2rem; background:white; border-radius:16px; box-shadow:0 2px 8px rgba(200,120,150,0.12);">
    <h3 style="font-family:'Playfair Display',serif; margin-bottom:0.5rem;">Ainda tem dúvidas?</h3>
    <p style="color:var(--text-mid); margin-bottom:1.2rem;">Entre em contato que respondemos com carinho!</p>
    <a th:href="@{/contato}" class="btn btn-primary">✉️ Fale Conosco</a>
  </div>
</section>

<footer>
  <p>🎂 Confeitaria Artesanal — Feito com amor</p>
</footer>

<script>
  document.querySelectorAll('.faq-question').forEach(q => {
    q.addEventListener('click', () => q.parentElement.classList.toggle('open'));
  });
</script>
</body>
</html>
