<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Admin Confeitaria</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-login">
<div class="login-wrap">
  <div class="login-card">
    <div style="font-size:3rem; margin-bottom:0.5rem;">🎂</div>
    <h1>Área Admin</h1>
    <p class="subtitle">Entre com suas credenciais para acessar</p>

    <div th:if="${param.error}" class="alert alert-error">
      Usuário ou senha incorretos.
    </div>

    <form th:action="@{/admin/login}" method="post">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" name="username" placeholder="admin" required autofocus/>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:0.8rem; font-size:1rem; margin-top:0.5rem; border-radius:8px;">Entrar</button>
    </form>
    <div style="margin-top:1.5rem;">
      <a th:href="@{/}" style="color:#A0AEC0; font-size:0.85rem;">← Voltar ao site</a>
    </div>
  </div>
</div>
</body>
</html>
