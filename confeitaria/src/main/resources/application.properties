spring.application.name=confeitaria

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/confeitaria;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (novos uploads via admin)
app.upload.dir=./uploads

# Imagens estáticas da pasta Imagens/ na raiz do projeto
app.images.dir=../Imagens

# Admin credentials (change before deploying)
app.admin.username=admin
app.admin.password=confeitaria123

# Porta — Railway injeta a variável PORT; em local usa 8080
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=false
